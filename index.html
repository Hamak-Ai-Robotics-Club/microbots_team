<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamak Robotics Club</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2740, #0a1f2e);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .cover {
      height: 220px;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(10,31,46,0.9)),
                  url('cover.jpg') center/cover no-repeat;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      transform: translateY(-70px);
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #ff6b35;
      background: white;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(255, 107, 53, 0.6);
    }

    h1 {
      margin-top: 15px;
      font-size: 26px;
      color: #ffffff;
    }

    .desc {
      margin-top: 10px;
      font-size: 14px;
      color: #cfe8ff;
      line-height: 1.7;
    }

    .links {
      margin-top: 25px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 16px;
      text-decoration: none;
      color: white;

      background: linear-gradient(135deg, #1e3a5f, #27496d);
      border: 1px solid rgba(255,255,255,0.1);

      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      box-shadow: 0 0 20px rgba(255, 107, 53, 0.6);
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: white;
      padding: 6px;
    }

    .text {
      text-align: right;
    }

    .text h3 {
      font-size: 15px;
    }

    .text p {
      font-size: 13px;
      color: #cfe8ff;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #7dd3fc;
    }

  </style>

</head>

<body>

  <div class="cover"></div>

  <div class="container">

    <img src="logo.jpg" class="logo" />

    <h1>Hamak Robotics Club</h1>

    <p class="desc">
      فريق تطوعي جامعي يهدف لنشر المعرفة في مجال الروبوتيك والذكاء الصناعي
    </p>

    <div class="links">

      <a class="btn" href="https://www.facebook.com/share/18V6xi5Sxb/" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/20/20837.png">
        <div class="text">
          <h3>FACEBOOK</h3>
          <p>آخر الأخبار والنشاطات</p>
        </div>
      </a>

      <a class="btn" href="https://www.instagram.com/hamak.ai.robotics.club/" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        <div class="text">
          <h3>INSTAGRAM</h3>
          <p>محتوى مميز وصور</p>
        </div>
      </a>

      <a class="btn" href="https://www.linkedin.com/company/hamak-ai-robotics-club/about/?viewAsMember=true" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/61/61109.png">
        <div class="text">
          <h3>LINKEDIN</h3>
          <p>الحضور المهني</p>
        </div>
      </a>

      <a class="btn" href="https://t.me/HamakAIClub" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
        <div class="text">
          <h3>TELEGRAM</h3>
          <p>الإعلانات والمستجدات</p>
        </div>
      </a>

      <a class="btn" href="https://www.youtube.com/@HamakAiRoboticsClub" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
        <div class="text">
          <h3>YOUTUBE</h3>
          <p>الفيديوهات</p>
        </div>
      </a>

      <a class="btn" href="https://github.com/Hamak-Ai-Robotics-Club" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/25/25231.png">
        <div class="text">
          <h3>GITHUB</h3>
          <p>مشاريعنا البرمجية</p>
        </div>
      </a>

    </div>

    <div class="footer">
      Powered by Hamak Robotics Club
    </div>

  </div>

</body>
</html>
